name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 같은 브랜치/PR 의 이전 실행은 취소 (자원 절약)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Prisma 클라이언트 생성/마이그레이션에 필요 (lint·build 단계도 generate 선행 필요)
  PNPM_VERSION: 11.2.2
  NODE_VERSION: 22

jobs:
  lint-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 타입체크/빌드/린트 모두 생성된 Prisma 클라이언트 타입에 의존
      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: Lint
        run: pnpm run lint:ci

      - name: Format check
        run: pnpm run format:check

      - name: Build
        run: pnpm run build

  e2e:
    name: E2E (PostGIS)
    runs-on: ubuntu-latest
    services:
      # .env.test 의 DATABASE_URL(localhost:5433/remedy_test) 와 일치하도록 포트 매핑
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: remedy_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma generate

      # 마이그레이션은 jest globalSetup(prisma migrate deploy)이 .env.test 기준으로 수행.
      # (스키마 드리프트 자동게이트는 raw SQL 전용 객체 — pg_trgm GIN/PostGIS GiST 인덱스·트리거 —
      #  가 Prisma datamodel 에 없어 false positive 가 나므로 도입하지 않음. migrate deploy 성공이 1차 검증)
      - name: Run E2E tests
        run: pnpm run test:e2e
